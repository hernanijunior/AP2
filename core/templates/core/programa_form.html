<!-- === core/templates/core/programa_form.html === -->
{% extends 'core/base.html' %}

{% block title %}{% if programa %}Editar{% else %}Novo{% endif %} Programa | Diploma Digital{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'programa_list' %}">Programas</a></li>
        <li class="breadcrumb-item active" aria-current="page">{% if programa %}Editar{% else %}Novo{% endif %}</li>
    </ol>
</nav>

<div class="card card-suap">
    <div class="card-header bg-white">
        <h5 class="mb-0"><i class="bi bi-building"></i> Dados do Programa</h5>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row mb-3">
                <div class="col-md-2">
                    <label class="form-label text-muted fw-bold">Sigla</label>
                    <input type="text" name="sigla" class="form-control"
                        value="{{ form.sigla.value|default_if_none:'' }}" required>
                </div>
                <div class="col-md-10">
                    <label class="form-label text-muted fw-bold">Nome do Programa</label>
                    <input type="text" name="nome" class="form-control" value="{{ form.nome.value|default_if_none:'' }}"
                        required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label text-muted fw-bold">Nível</label>
                    <select name="nivel" id="id_nivel" class="form-select" required>
                        <option value="MESTRADO_ACADEMICO">Mestrado Acadêmico</option>
                        <option value="MESTRADO_PROFISSIONAL">Mestrado Profissional</option>
                        <option value="DOUTORADO">Doutorado</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted fw-bold">Área CAPES</label>
                    <input type="text" name="area_capes" class="form-control"
                        value="{{ form.area_capes.value|default_if_none:'' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted fw-bold">Código Sucupira</label>
                    <input type="text" name="codigo_sucupira" class="form-control"
                        value="{{ form.codigo_sucupira.value|default_if_none:'' }}" required>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-4">
                    <label class="form-label text-muted fw-bold">Modalidade</label>
                    <select name="modalidade" id="id_modalidade" class="form-select" required>
                        <option value="PRESENCIAL">Presencial</option>
                        <option value="EAD">EaD</option>
                        <option value="HIBRIDO">Híbrido</option>
                    </select>
                </div>

                <script>
                    document.addEventListener("DOMContentLoaded", function () {
                        var nivelAtivo = "{{ form.nivel.value|default_if_none:'' }}";
                        var modalidadeAtiva = "{{ form.modalidade.value|default_if_none:'' }}";

                        if (nivelAtivo) document.getElementById("id_nivel").value = nivelAtivo;
                        if (modalidadeAtiva) document.getElementById("id_modalidade").value = modalidadeAtiva;

                        var isAtivo = "{{ form.ativo.value|yesno:'true,false' }}";
                        var isNovo = "{% if not programa %}true{% else %}false{% endif %}";
                        if (isAtivo === 'true' || isNovo === 'true') {
                            document.getElementById("ativo").checked = true;
                        }
                    });
                </script>
                <div class="col-md-4 d-flex align-items-end mb-2">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="ativo" id="ativo">
                        <label class="form-check-label text-muted fw-bold" for="ativo">Programa Ativo</label>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'programa_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-success"><i class="bi bi-check2"></i> Salvar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
