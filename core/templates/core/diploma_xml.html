<!-- === core/templates/core/diploma_xml.html === -->
{% extends 'core/base.html' %}

{% block title %}XML do Diploma #{{ diploma.id }} | Diploma Digital{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'defesa_list' %}">Processos</a></li>
        <li class="breadcrumb-item"><a href="{% url 'diploma_detail' diploma.defesa.id %}">Processo #{{ diploma.id
                }}</a></li>
        <li class="breadcrumb-item active" aria-current="page">XML</li>
    </ol>
</nav>

<div class="card card-suap">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i class="bi bi-code-slash"></i> XML do Diploma Digital</h5>
        <div>
            <button class="btn btn-sm btn-outline-primary me-2" onclick="copiarXML()"><i class="bi bi-clipboard"></i>
                Copiar</button>
            <button class="btn btn-sm btn-primary" onclick="downloadXML()"><i class="bi bi-download"></i> Baixar
                .xml</button>
        </div>
    </div>
    <div class="card-body p-0 bg-dark">
        <pre><code class="text-light p-4 d-block" style="font-size: 0.85rem;" id="xmlContent">{{ diploma.xml_gerado }}</code></pre>
    </div>
</div>

<script>
    function copiarXML() {
        var content = document.getElementById('xmlContent').innerText;
        navigator.clipboard.writeText(content).then(function () {
            alert('XML copiado para a área de transferência!');
        });
    }
    function downloadXML() {
        var content = document.getElementById('xmlContent').innerText;
        var blob = new Blob([content], { type: "application/xml" });
        var url = window.URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "diploma_{{ diploma.id }}.xml";
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
    }
</script>
{% endblock %}
