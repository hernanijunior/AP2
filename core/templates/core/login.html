<!-- === core/templates/core/login.html === -->
{% extends 'core/base.html' %}

{% block login_content %}
<div class="card card-suap" style="width: 100%; max-width: 400px; border-top-color: var(--primary);">
    <div class="card-header text-center bg-white py-4">
        <i class="bi bi-mortarboard" style="font-size: 3rem; color: var(--primary);"></i>
        <h4 class="mt-2" style="color: var(--primary);">Diploma Digital</h4>
        <div class="text-muted small">Universidade Federal de Mato Grosso</div>
    </div>
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label text-muted">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" id="id_username" class="form-control"
                        placeholder="Admin (Ex: admin)" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label for="id_password" class="form-label text-muted">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" id="id_password" class="form-control" placeholder="Senha"
                        required>
                </div>
            </div>
            {% if form.errors %}
            <div class="alert alert-danger py-2 small">Usuário ou senha inválidos.</div>
            {% endif %}
            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right"></i> Entrar no
                SUAP</button>
        </form>
    </div>
</div>
{% endblock %}
