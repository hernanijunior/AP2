<!-- === core/templates/core/orientador_form.html === -->
{% extends 'core/base.html' %}

{% block title %}Novo Orientador | Diploma Digital{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'orientador_list' %}">Orientadores</a></li>
        <li class="breadcrumb-item active" aria-current="page">Novo</li>
    </ol>
</nav>

<div class="card card-suap">
    <div class="card-header bg-white">
        <h5 class="mb-0"><i class="bi bi-person-badge"></i> Dados do Orientador</h5>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row mb-3">
                <div class="col-md-8">
                    <label class="form-label text-muted fw-bold">Nome Completo</label>
                    <input type="text" name="nome_completo" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted fw-bold">CPF</label>
                    <input type="text" name="cpf" class="form-control" required>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-5">
                    <label class="form-label text-muted fw-bold">E-mail</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label text-muted fw-bold">Currículo Lattes (URL)</label>
                    <input type="url" name="lattes" class="form-control">
                </div>
                <div class="col-md-2 d-flex align-items-end mb-2">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="ativo" id="ativo" checked>
                        <label class="form-check-label text-muted fw-bold" for="ativo">Ativo</label>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'orientador_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-success"><i class="bi bi-check2"></i> Salvar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
